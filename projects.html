<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Works — KNUFF</title>
  <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('knuff-theme') || 'dark');</script>
  <script src="https://unpkg.com/@studio-freight/lenis@1.0.33/dist/lenis.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wdth,wght@75,300;75,400;75,600;75,700&family=Roboto+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #000000;
      --bg-secondary: #0B0B0B;
      --bg-tertiary: #272A2A;
      --text-primary: #FFFFFF;
      --text-secondary: #CECECE;
      --text-muted: #858585;
      --accent: #CC6437;
      --border: #FFFFFF;
      --border-muted: rgba(255,255,255,0.12);
      --border-subtle: rgba(255,255,255,0.06);
      --font-condensed: 'Open Sans', sans-serif;
      --font-body: 'Roboto Mono', monospace;
      --text-caption: 11px;
      --text-body: 14px;
      --radius-pill: 1440px;
      --radius-subtle: 4px;
      --radius-general: 10px;
      --transition: 0.3s ease;
    }
    [data-theme="light"] {
      --bg-primary: #F2F2ED;
      --bg-secondary: #FFFFFF;
      --bg-tertiary: #E8E8E3;
      --text-primary: #0B0B0B;
      --text-secondary: #555555;
      --text-muted: #999999;
      --accent: #CC6437;
      --border: #0B0B0B;
      --border-muted: rgba(0,0,0,0.12);
      --border-subtle: rgba(0,0,0,0.06);
    }
    [data-theme="light"] .nav { background: rgba(242,242,237,0.7); }
    [data-theme="light"] .theme-fab { background: rgba(242,242,237,0.8); }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      background: var(--bg-primary); color: var(--text-primary);
      font-family: var(--font-body); font-size: var(--text-body);
      overflow: hidden; width: 100vw; height: 100vh;
      transition: background var(--transition), color var(--transition);
    }
    a { text-decoration: none; color: inherit; }

    .page-transition {
      position: fixed; inset: 0; z-index: 10001;
      background: #000; pointer-events: none;
      opacity: 0; transition: opacity 0.35s ease;
    }
    .page-transition.active { opacity: 1; }

    .nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 40px;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border-subtle);
    }
    .nav .brand {
      font-family: var(--font-condensed); font-stretch: 75%;
      font-size: 15px; font-weight: 700; letter-spacing: -0.02em;
      color: var(--text-primary); text-transform: uppercase;
      text-decoration: none;
    }
    .nav-links {
      display: flex; align-items: center; gap: 6px;
    }
    .nav-links a {
      font-family: var(--font-condensed); font-stretch: 75%;
      font-size: 13px; font-weight: 400; letter-spacing: -0.02em;
      color: var(--text-secondary); text-transform: uppercase;
      padding: 6px 16px; border-radius: var(--radius-pill);
      border: 1px solid transparent;
      transition: color var(--transition), background var(--transition), border-color var(--transition);
      display: flex; align-items: center; gap: 6px;
      text-decoration: none;
    }
    .nav-links a:hover { color: var(--text-primary); border-color: var(--border-muted); }
    .nav-links a.active, .nav-links a.active:hover {
      color: var(--text-primary); background: var(--bg-secondary);
      border-color: var(--border-muted);
    }

    .theme-fab {
      position: fixed; bottom: 32px; right: 32px; z-index: 200;
      width: 40px; height: 40px; border-radius: var(--radius-pill);
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--border-muted);
      color: var(--text-secondary); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: color var(--transition), border-color var(--transition);
    }
    .theme-fab:hover { color: var(--text-primary); border-color: var(--border); }
    .icon-wrap { position: relative; width: 16px; height: 16px; pointer-events: none; }
    .icon-wrap svg {
      position: absolute; top: 0; left: 0;
      transition: transform 0.5s cubic-bezier(0.34,1.2,0.64,1), opacity 0.4s ease;
      stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }
    .sun { opacity: 1; transform: rotate(0deg) scale(1); }
    .moon { opacity: 0; transform: rotate(-90deg) scale(0); }
    [data-theme="dark"] .sun { opacity: 0; transform: rotate(90deg) scale(0); }
    [data-theme="dark"] .moon { opacity: 1; transform: rotate(0deg) scale(1); }

    .viewport { position: fixed; inset: 0; perspective: 1000px; overflow: hidden; z-index: 1; }
    .world { position: absolute; top: 50%; left: 50%; transform-style: preserve-3d; will-change: transform; }
    .item { position: absolute; left: 0; top: 0; backface-visibility: hidden; transform-origin: center center; display: flex; align-items: center; justify-content: center; }

    .card {
      width: 320px; min-height: 420px; background: var(--bg-secondary);
      border: 1px solid var(--border-muted); position: relative;
      padding: 24px; display: flex; flex-direction: column;
      justify-content: space-between;
      transform: translate(-50%,-50%);
      transition: border-color var(--transition);
      overflow: hidden;
    }
    .card:hover { border-color: var(--accent); }
    .card::after {
      content: ''; position: absolute; inset: 0; z-index: 1;
      pointer-events: none;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.015) 2px, rgba(255,255,255,0.015) 4px);
    }
    [data-theme="light"] .card::after {
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.02) 2px, rgba(0,0,0,0.02) 4px);
    }
    .card > * { position: relative; z-index: 2; }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .card-cat {
      font-family: var(--font-body); font-size: var(--text-caption);
      color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em;
    }
    .card-body { flex: 1; display: flex; flex-direction: column; justify-content: center; }
    .card-body h2 {
      font-family: var(--font-condensed); font-stretch: 75%;
      font-size: 28px; font-weight: 600; letter-spacing: -0.02em;
      text-transform: uppercase; color: var(--text-primary);
      margin-bottom: 8px; line-height: 1;
    }
    .card-body p {
      font-family: var(--font-body); font-size: 11px; line-height: 1.5;
      color: var(--text-muted);
    }
    .card-footer {
      margin-top: 16px; padding-top: 12px;
      border-top: 1px solid var(--border-subtle);
      font-family: var(--font-body); font-size: var(--text-caption);
      color: var(--text-muted); display: flex; justify-content: space-between;
    }
    .card { cursor: pointer; }

    .big-text {
      font-family: var(--font-condensed); font-stretch: 75%;
      font-size: 10vw; font-weight: 700; letter-spacing: -0.03em;
      color: transparent; -webkit-text-stroke: 1.5px var(--border-subtle);
      text-transform: uppercase; white-space: nowrap;
      transform: translate(-50%,-50%); pointer-events: none;
      line-height: 1;
    }
    [data-theme="light"] .big-text { -webkit-text-stroke: 1.5px var(--border-muted); }

    .scroll-proxy { height: 10000vh; position: absolute; width: 100%; z-index: -1; }

    @media (max-width: 768px) {
      .card { width: 260px; min-height: 340px; padding: 18px; }
      .card-body h2 { font-size: 22px; }
      .big-text { font-size: 14vw; -webkit-text-stroke: 1px var(--border-subtle); }
    }
    @media (max-width: 480px) {
      .card { width: 220px; min-height: 280px; padding: 14px; }
      .card-body h2 { font-size: 18px; }
      .card-body p { font-size: 10px; }
    }
    @media (max-width: 768px) {
      .nav { padding: 10px 20px; }
      .nav .brand { font-size: 13px; }
      .nav-links a { font-size: 11px; padding: 4px 12px; gap: 4px; }
      .theme-fab { bottom: 20px; right: 20px; width: 36px; height: 36px; }
    }
    @media (max-width: 480px) {
      .nav-links a span { display: none; }
      .nav { padding: 10px 16px; }
      .nav-links a { padding: 4px 10px; }
    }

    @media (max-width: 480px) {
      .scrollbar { display: none; }
    }
    @media (max-width: 480px) {
      .nav-links a span { display: none; }
    }
  </style>
</head>
<body>
  <div class="page-transition" id="pageTransition"></div>

  <nav class="nav" id="nav">
    <a href="index.html" class="brand">KNUFF</a>
    <div class="nav-links">
      <a href="index.html"><span>[&nbsp;&nbsp;]</span> Home</a>
      <a href="projects.html" class="active"><span>[●]</span> Works</a>
      <a href="about.html"><span>[&nbsp;&nbsp;]</span> About</a>
      <a href="contact.html"><span>[&nbsp;&nbsp;]</span> Contact</a>
    </div>
  </nav>

  <button class="theme-fab" id="modeToggle">
    <div class="icon-wrap">
      <svg class="sun" width="16" height="16" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="5"/>
        <line x1="12" y1="1" x2="12" y2="3"/>
        <line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/>
        <line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
      <svg class="moon" width="16" height="16" viewBox="0 0 24 24">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </div>
  </button>

  <div class="viewport" id="viewport">
    <div class="world" id="world"></div>
  </div>

  <div class="scroll-proxy"></div>

  <script>
    var PROJECTS = [
      { name: "Drakkar Active", cat: "Brand Identity",
        desc: "Brand ecosystem for premium activewear. Motion-driven storytelling meets editorial precision." },
      { name: "Haut", cat: "Luxury Editorial",
        desc: "High-fashion editorial platform with immersive scroll narratives and custom typography." },
      { name: "C'estLaVie", cat: "Lifestyle",
        desc: "Culture-first destination blending photography, video, and reactive interface design." },
      { name: "iPhone 17 PRO", cat: "Product Launch",
        desc: "Product reveal with real-time 3D rendering and cinematic transitions." },
      { name: "Formula 1", cat: "Data Viz",
        desc: "High-speed telemetry dashboard with GPU-accelerated particle streams." },
      { name: "District One", cat: "Urban Collection",
        desc: "Spatial web experience for urban lifestyle brand with layered storytelling." }
    ];

    var TEXTS = PROJECTS.map(function(p){ return p.name.toUpperCase(); });

    var isMobile = window.innerWidth < 768;
    var isSmall = window.innerWidth < 480;

    var CONFIG = {
      itemCount: isSmall ? 6 : isMobile ? 8 : 12,
      zGap: 1000,
      camSpeed: 2.5,
    };
    CONFIG.loopSize = CONFIG.itemCount * CONFIG.zGap;

    var state = { scroll: 0, velocity: 0, targetSpeed: 0, mouseX: 0, mouseY: 0 };
    var world = document.getElementById('world');
    var viewport = document.getElementById('viewport');
    var items = [];

    function init() {
      for (var i = 0; i < CONFIG.itemCount; i++) {
        var el = document.createElement('div');
        el.className = 'item';
        var isHeading = i % 2 === 0;

        if (isHeading) {
          var txt = document.createElement('div');
          txt.className = 'big-text';
          txt.innerText = TEXTS[Math.floor(i / 2) % TEXTS.length];
          el.appendChild(txt);
          var ty = (isMobile || isSmall) ? -window.innerHeight * 0.35 : 0;
          items.push({ el: el, type: 'text', x: 0, y: ty, rot: 0, baseZ: -i * CONFIG.zGap });
        } else {
          var projIdx = Math.floor(i / 2) % PROJECTS.length;
          var p = PROJECTS[projIdx];
          var card = document.createElement('div');
          card.className = 'card';
          card.setAttribute('data-proj', projIdx);
          card.innerHTML =
            '<div class="card-header"><span class="card-cat">' + p.cat + '</span></div>' +
            '<div class="card-body"><h2>' + p.name + '</h2><p>' + p.desc + '</p></div>' +
            '<div class="card-footer"><span>' + String(projIdx + 1).padStart(2, '0') + '</span><span>View project &rarr;</span></div>';
          card.addEventListener('click', function(projIdx) {
            return function() { window.location.href = 'project.html?id=' + projIdx; };
          }(projIdx));
          el.appendChild(card);
          var angle = (i / CONFIG.itemCount) * Math.PI * 6;
          var spread = isSmall ? 0.35 : isMobile ? 0.3 : 0.25;
          var cx = (isMobile || isSmall) ? 0 : Math.cos(angle) * (window.innerWidth * spread);
          var cy = (isMobile || isSmall) ? 0 : Math.sin(angle) * (window.innerHeight * spread);
          var rot = (Math.random() - 0.5) * 25;
          items.push({ el: el, type: 'card', x: cx, y: cy, rot: rot, baseZ: -i * CONFIG.zGap });
        }
        world.appendChild(el);
      }

      window.addEventListener('mousemove', function(e) {
        state.mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
        state.mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
      });
    }

    init();

    var lenis = new Lenis({ smooth: true, lerp: 0.08, direction: 'vertical', gestureDirection: 'vertical', smoothTouch: true });
    lenis.on('scroll', function(data) { state.scroll = data.scroll; state.targetSpeed = data.velocity; });

    var lastTime = 0;
    var isSnapping = false;
    var snapThreshold = 0.3;

    function getCardSnapScrolls() {
      var snaps = [];
      for (var ci = 0; ci < CONFIG.itemCount / 2; ci++) {
        snaps.push(((2*ci+1) * CONFIG.zGap) / CONFIG.camSpeed);
      }
      return snaps;
    }

    function raf(time) {
      lenis.raf(time);
      var delta = time - lastTime; lastTime = time;
      state.velocity += (state.targetSpeed - state.velocity) * 0.1;

      if (Math.abs(state.velocity) < snapThreshold && !isSnapping && Math.abs(state.targetSpeed) < snapThreshold * 2) {
        var snaps = getCardSnapScrolls();
        var near = snaps[0], minD = Math.abs(state.scroll - near);
        for (var si = 1; si < snaps.length; si++) {
          var dd = Math.abs(state.scroll - snaps[si]);
          if (dd < minD) { minD = dd; near = snaps[si]; }
        }
        if (minD > 8) {
          isSnapping = true;
          lenis.scrollTo(near, { duration: 0.45, easing: function(t) { return 1 - Math.pow(1 - t, 3); } });
          setTimeout(function() { isSnapping = false; }, 550);
        }
      }

      var cameraZ = state.scroll * CONFIG.camSpeed;
      var tiltX = state.mouseY * 5 - state.velocity * 0.5;
      var tiltY = state.mouseX * 5;
      world.style.transform = 'rotateX(' + tiltX + 'deg) rotateY(' + tiltY + 'deg)';

      var baseFov = 1000;
      viewport.style.perspective = (baseFov - Math.min(Math.abs(state.velocity) * 10, 600)) + 'px';

      var modC = CONFIG.loopSize;
      for (var i = 0; i < items.length; i++) {
        var item = items[i];
        var relZ = item.baseZ + cameraZ;
        var vizZ = ((relZ % modC) + modC) % modC;
        if (vizZ > 500) vizZ -= modC;

        var alpha = 1;
        if (vizZ < -3000) alpha = 0;
        else if (vizZ < -2000) alpha = (vizZ + 3000) / 1000;
        if (vizZ > 100 && item.type !== 'star') alpha = 1 - ((vizZ - 100) / 400);
        if (alpha < 0.01) alpha = 0;
        item.el.style.opacity = alpha;

        if (alpha > 0) {
          var trans = 'translate3d(' + item.x + 'px, ' + item.y + 'px, ' + vizZ + 'px)';
          if (item.type === 'text') {
            trans += ' rotateZ(' + item.rot + 'deg)';
            var dist = Math.abs(vizZ);
            item.el.style.filter = dist > 400 ? 'blur(' + Math.min((dist - 400) / 30, 12) + 'px)' : 'blur(0px)';
          } else {
            var t = time * 0.001;
            var float = Math.sin(t + item.x) * 10;
            trans += ' rotateZ(' + item.rot + 'deg) rotateY(' + float + 'deg)';
            var dist = Math.abs(vizZ);
            item.el.style.filter = dist > 300 ? 'blur(' + Math.min((dist - 300) / 40, 8) + 'px)' : 'blur(0px)';
          }
          item.el.style.transform = trans;
        }
      }
      requestAnimationFrame(raf);
    }
    requestAnimationFrame(raf);

    world.addEventListener('click', function(e) {
      var cardEl = e.target.closest('.card');
      if (!cardEl) return;
      var pi = parseInt(cardEl.getAttribute('data-proj'));
      if (isNaN(pi)) return;
      window.location.href = 'project.html?id=' + pi;
    });
  </script>

  <script>
    (function() {
      var t = document.getElementById('pageTransition');
      if (t) t.classList.remove('active');
      document.addEventListener('click', function(e) {
        var link = e.target.closest('a[href]');
        if (!link) return;
        var href = link.getAttribute('href');
        if (!href || href.startsWith('#') || href.startsWith('mailto:') || href.startsWith('http')) return;
        e.preventDefault();
        if (t) t.classList.add('active');
        setTimeout(function() { window.location.href = href; }, 350);
      });
    })();
  </script>

  <script>
    var modeBtn = document.getElementById('modeToggle');
    if (modeBtn) {
      modeBtn.addEventListener('click', function() {
        var html = document.documentElement;
        var isDark = html.getAttribute('data-theme') === 'dark';
        var next = isDark ? 'light' : 'dark';
        html.setAttribute('data-theme', next);
        localStorage.setItem('knuff-theme', next);
      });
    }
  </script>
</body>
</html>
