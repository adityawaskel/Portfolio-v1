<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HYPER SCROLL // PROJECTS</title>
  <script src="https://unpkg.com/@studio-freight/lenis@1.0.33/dist/lenis.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Syncopate:wght@400;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { cursor: none; }
    a, button, input, textarea, [role="button"] { cursor: none; }
    .cursor-ring {
      position: fixed; top: 0; left: 0; z-index: 9999;
      width: 28px; height: 28px; border-radius: 50%;
      border: 1px solid var(--text);
      pointer-events: none;
      transition: width 0.3s ease, height 0.3s ease, border-color 0.3s ease, background 0.3s ease;
      transform: translate(-50%, -50%);
      will-change: transform;
    }
    .cursor-ring.hover { width: 44px; height: 44px; border-color: var(--hud); }
    .cursor-dot {
      position: fixed; top: 0; left: 0; z-index: 10000;
      width: 4px; height: 4px; border-radius: 50%;
      background: var(--text);
      pointer-events: none;
      transform: translate(-50%, -50%);
      transition: width 0.25s ease, height 0.25s ease;
    }
    .cursor-dot.hover { width: 2px; height: 2px; }
    .page-transition {
      position: fixed; inset: 0; z-index: 10001;
      background: #000; pointer-events: none;
      opacity: 0; transition: opacity 0.35s ease;
    }
    .page-transition.active { opacity: 1; }
    :root {
      --bg: #030303; --card-bg: rgba(10,10,10,0.4); --text: #e0e0e0; --accent: #ff003c; --accent2: #00f3ff; --border: rgba(255,255,255,0.1); --hud: rgba(255,255,255,0.5); --stroke: rgba(255,255,255,0.15); --star: #fff; --scan: rgba(0,0,0,0.2); --card-text: rgba(255,255,255,0.4);
      --font-display: 'Syncopate', sans-serif; --font-code: 'JetBrains Mono', monospace; --font-mono: 'DM Mono', monospace;
      --glass-bg: rgba(30,30,35,0.45); --header-blur: 50px;
      --glass-border: rgba(255,255,255,0.15);
      --glass-shadow: rgba(0,0,0,0.8);
      --glass-highlight: rgba(255,255,255,0.25);
      --glass-caustic: rgba(255,255,255,0.05);
      --reflection-start: rgba(255,255,255,0.15);
      --reflection-end: rgba(255,255,255,0.0);
      --glare-color: rgba(255,255,255,0.15);
      --nav-text: rgba(255,255,255,0.5);
    }
    html.light {
      --bg: #ececec; --card-bg: rgba(255,255,255,0.85); --text: #111; --accent: #dc2626; --accent2: #0077cc; --border: rgba(0,0,0,0.1); --hud: rgba(0,0,0,0.5); --stroke: rgba(0,0,0,0.2); --star: #666; --scan: rgba(0,0,0,0.03); --card-text: rgba(0,0,0,0.4);
      --glass-bg: rgba(255,255,255,0.15);
      --glass-border: rgba(255,255,255,0.4);
      --glass-shadow: rgba(0,0,0,0.1);
      --glass-highlight: rgba(255,255,255,0.8);
      --glass-caustic: rgba(255,255,255,0.4);
      --reflection-start: rgba(255,255,255,0.6);
      --reflection-end: rgba(255,255,255,0.0);
      --glare-color: rgba(255,255,255,0.5);
      --nav-text: rgba(0,0,0,0.6); --font-mono: 'DM Mono', monospace; --header-blur: 50px;
    }
    html, body { height: 100%; }
    body {
      background: var(--bg); color: var(--text); font-family: var(--font-display); overflow: hidden; width: 100vw; height: 100vh; cursor: crosshair; transition: background 0.4s;
    }

    /* Loading screen */
    #loader {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #030303; transition: opacity 0.8s ease, visibility 0.8s ease;
    }
    #loader.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    .loader-asterisk {
      width: 36px; height: 36px;
      animation: loader-spin 1.6s linear infinite;
    }
    .loader-asterisk polygon { fill: var(--accent); }
    .loader-bar {
      margin-top: 2rem; width: 120px; height: 1px;
      background: rgba(255,255,255,0.1); overflow: hidden; position: relative;
    }
    .loader-bar::after {
      content: ''; position: absolute; top: 0; left: -100%;
      width: 100%; height: 100%; background: var(--accent);
      animation: loader-sweep 1.4s ease-in-out infinite;
    }
    @keyframes loader-spin { to { transform: rotate(360deg); } }
    @keyframes loader-sweep {
      0% { left: -100%; }
      100% { left: 200%; }
    }

    .toggle-mode {
      position: fixed; bottom: 2rem; right: 2rem; z-index: 30; pointer-events: auto;
      font-family: var(--font-code); font-size: 9px; text-transform: uppercase;
      background: none; border: 1px solid var(--border); color: var(--hud);
      padding: 0.5rem 1rem; cursor: pointer; letter-spacing: 0.1em;
      transition: all 0.3s; backdrop-filter: blur(8px);
    }
    .toggle-mode:hover { border-color: var(--accent); color: var(--accent); }
    .scanlines { position: fixed; inset: 0; background: linear-gradient(to bottom, transparent, transparent 50%, var(--scan) 50%, var(--scan)); background-size: 100% 4px; pointer-events: none; z-index: 10; }
    .vignette { position: fixed; inset: 0; background: radial-gradient(circle, transparent 40%, #000 120%); z-index: 11; pointer-events: none; transition: background 0.4s; }
    html.light .vignette { background: radial-gradient(circle, transparent 50%, rgba(0,0,0,0.04) 120%); }
    .noise { position: fixed; inset: 0; z-index: 12; opacity: 0.07; pointer-events: none; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E"); }
    html.light .noise { opacity: 0.03; }
    .hud {
      position: fixed; inset: 2rem; z-index: 20; pointer-events: none;
      display: flex; flex-direction: column; justify-content: space-between;
      font-family: var(--font-code); font-size: 10px; color: var(--hud);
      text-transform: uppercase; transition: color 0.4s;
    }
    .hud-top, .hud-bottom { display: flex; justify-content: space-between; align-items: center; }
    .hud a { color: var(--hud); text-decoration: none; transition: color 0.3s; pointer-events: auto; }
    .hud a:hover { color: var(--accent); }
    .hud strong { color: var(--accent2); }
    .hud strong.accent { color: var(--accent); }
    .hud-line { flex: 1; height: 1px; background: var(--border); margin: 0 1rem; position: relative; transition: background 0.4s; }
    .hud-line::after { content: ''; position: absolute; right: 0; top: -2px; width: 5px; height: 5px; background: var(--accent); }
    .center-nav { align-self: flex-start; margin-top: auto; margin-bottom: auto; writing-mode: vertical-rl; transform: rotate(180deg); }
    .viewport { position: fixed; inset: 0; perspective: 1000px; overflow: hidden; z-index: 1; }
    .world { position: absolute; top: 50%; left: 50%; transform-style: preserve-3d; will-change: transform; }
    .item { position: absolute; left: 0; top: 0; backface-visibility: hidden; transform-origin: center center; display: flex; align-items: center; justify-content: center; }
    .card {
      width: 320px; min-height: 440px; background: var(--card-bg); border: 1px solid var(--border);
      position: relative; padding: 1.75rem; display: flex; flex-direction: column;
      justify-content: space-between; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 0 0 1px rgba(0,0,0,0.5), 0 20px 50px rgba(0,0,0,0.5);
      transition: border-color 0.3s, box-shadow 0.3s, background 0.3s; transform: translate(-50%,-50%);
      pointer-events: auto;
    }
    .card:hover { border-color: var(--accent); box-shadow: 0 0 30px rgba(255,0,60,0.2), 0 0 0 1px var(--accent); background: rgba(20,20,20,0.8); z-index: 100; }
    html.light .card:hover { background: rgba(255,255,255,0.95); box-shadow: 0 0 30px rgba(220,38,38,0.1), 0 0 0 1px var(--accent); }
    .card::before, .card::after { content: ''; position: absolute; z-index: 2; pointer-events: none; width: 10px; height: 10px; border: 1px solid transparent; transition: width 0.3s, height 0.3s, border-color 0.3s; }
    .card::before { top: -1px; left: -1px; border-top-color: var(--text); border-left-color: var(--text); }
    .card::after { bottom: -1px; right: -1px; border-bottom-color: var(--text); border-right-color: var(--text); }
    .card:hover::before, .card:hover::after { width: calc(100% + 2px); height: calc(100% + 2px); border-color: var(--accent); }
    .card-header { border-bottom: 1px solid var(--border); padding-bottom: 0.75rem; display: flex; justify-content: space-between; align-items: center; }
    .card-id { font-family: var(--font-code); color: var(--accent); font-size: 0.75rem; letter-spacing: 0.02em; }
    .card-body { flex: 1; display: flex; flex-direction: column; }
    .card .img-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin: 0.75rem 0; }
    .card .img-grid .img-wrap { border-radius: 2px; overflow: hidden; border: 1px solid var(--border); }
    .card .img-grid .img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .card .img-grid .img-main { grid-column: 1 / -1; }
    .card .img-grid .img-main .img-wrap { height: 140px; }
    .card .img-grid .img-sm .img-wrap { height: 72px; }
    .card h2 { font-size: 1.6rem; line-height: 0.9; margin: 0 0 0.25rem; text-transform: uppercase; font-weight: 700; color: var(--text); letter-spacing: -0.02em; }
    .card p { font-family: var(--font-code); font-size: 0.55rem; line-height: 1.6; color: var(--card-text); }
    .card-footer { margin-top: auto; font-family: var(--font-code); font-size: 0.55rem; color: var(--card-text); display: flex; justify-content: space-between; padding-top: 0.75rem; border-top: 1px solid var(--border); }
    .big-text { font-size: 11vw; font-weight: 800; color: transparent; -webkit-text-stroke: 2.5px var(--stroke); text-transform: uppercase; white-space: nowrap; transform: translate(-50%,-50%); pointer-events: none; letter-spacing: -0.3rem; line-height: 1; mix-blend-mode: overlay; transition: -webkit-text-stroke 0.4s; }
    .star { position: absolute; width: 2px; height: 2px; background: var(--star); transform: translate(-50%,-50%); transition: background 0.4s; pointer-events: none; }
    .scanlines, .vignette, .noise, .hud { pointer-events: none; }
    .scroll-proxy { height: 10000vh; position: absolute; width: 100%; z-index: -1; }

    .card { cursor: pointer; }

    @media (max-width: 768px) {
      .card { width: 260px; min-height: 360px; padding: 1.25rem; }
      .card .img-grid .img-main .img-wrap { height: 110px; }
      .card .img-grid .img-sm .img-wrap { height: 56px; }
      .card h2 { font-size: 1.2rem; }
      .card p { font-size: 0.5rem; }
      .card-footer { font-size: 0.5rem; padding-top: 0.5rem; }
      .card-id { font-size: 0.6rem; }
      .big-text { font-size: 14vw; letter-spacing: -0.15rem; -webkit-text-stroke: 1.5px var(--stroke); }
      .hud { inset: 1rem; font-size: 7px; }
      .toggle-mode { bottom: 1rem; right: 1rem; padding: 0.35rem 0.7rem; font-size: 7px; }
      .center-nav { font-size: 7px; }
    }
    @media (max-width: 480px) {
      .card { width: 220px; min-height: 300px; padding: 1rem; }
      .card .img-grid .img-main .img-wrap { height: 90px; }
      .card .img-grid .img-sm .img-wrap { height: 46px; }
      .card .img-grid { gap: 3px; margin: 0.5rem 0; }
      .card h2 { font-size: 1rem; }
      .card .img-grid .img-sm { display: none; }
      .card .img-grid .img-main { grid-column: 1; }
      .big-text { font-size: 16vw; letter-spacing: -0.1rem; -webkit-text-stroke: 1px var(--stroke); }
      .hud { inset: 0.75rem; font-size: 6px; }
      .hud-line { margin: 0 0.5rem; }
    }
    /* ─── Liquid Glass Nav ─── */
    .liquid-nav {
      position: fixed; top: 24px; left: 24px; right: 24px; z-index: 100;
      display: flex; align-items: center; justify-content: center;
      padding: 6px 16px; border-radius: 99px;
      background: var(--glass-bg);
      backdrop-filter: blur(var(--header-blur, 50px)) saturate(200%);
      -webkit-backdrop-filter: blur(var(--header-blur, 50px)) saturate(200%);
      box-shadow: 0 40px 80px -20px var(--glass-shadow), 0 10px 30px -10px var(--glass-shadow), inset 0 2px 3px -1px var(--glass-highlight), inset 0 -2px 4px -1px var(--glass-caustic), inset 0 0 0 1px var(--glass-border);
      transition: all 0.5s ease;
    }
    .liquid-nav .brand {
      position: absolute; left: 16px; z-index: 2;
      color: var(--text); font-family: var(--font-mono);
      font-size: 0.8rem; font-weight: 500; letter-spacing: 0.02em;
      padding: 6px 8px; height: 36px; display: flex; align-items: center;
    }
    .nav-links {
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .nav-links a {
      position: relative; z-index: 1;
      background: transparent; border: none;
      padding: 6px 14px; height: 36px; border-radius: 99px;
      font-family: var(--font-mono); font-size: 0.75rem; font-weight: 500;
      letter-spacing: 0.02em; color: var(--nav-text); cursor: pointer;
      display: flex; align-items: center; gap: 4px;
      transition: color 0.3s ease;
    }
    .nav-links a.active, .nav-links a:hover { color: var(--text); }

    .theme-fab {
      position: fixed; bottom: 32px; right: 32px; z-index: 200;
      width: 42px; height: 42px; border-radius: 50%;
      background: var(--glass-bg);
      backdrop-filter: blur(24px) saturate(200%);
      -webkit-backdrop-filter: blur(24px) saturate(200%);
      border: 1px solid var(--glass-border);
      box-shadow: 0 8px 24px -8px var(--glass-shadow);
      color: var(--nav-text); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: color 0.3s ease, background 0.3s ease;
    }
    .theme-fab:hover { color: var(--text); background: var(--card-bg); }
    .icon-wrap { position: relative; width: 18px; height: 18px; pointer-events: none; }
    .icon-wrap svg {
      position: absolute; top: 0; left: 0;
      transition: transform 0.5s cubic-bezier(0.34,1.2,0.64,1), opacity 0.4s ease;
      stroke-width: 2.2;
    }
    .sun { opacity: 1; transform: rotate(0deg) scale(1); }
    .moon { opacity: 0; transform: rotate(-90deg) scale(0); }
    [data-theme="dark"] .sun { opacity: 0; transform: rotate(90deg) scale(0); }
    [data-theme="dark"] .moon { opacity: 1; transform: rotate(0deg) scale(1); }
    @media (max-width: 900px) {
      .liquid-nav { left: 16px; right: 16px; top: 16px; padding: 4px 10px; }
      .liquid-nav .brand { font-size: 0.65rem; padding: 4px 4px; height: 32px; left: 8px; }
      .nav-links a { font-size: 0.65rem; padding: 4px 8px; height: 32px; }
      .nav-links { gap: 2px; }
      .theme-fab { bottom: 20px; right: 20px; width: 38px; height: 38px; }
    }
  </style>
</head>
<body>

  <div class="page-transition" id="pageTransition"></div>
  <div class="cursor-ring" id="cursorRing"></div>
  <div class="cursor-dot" id="cursorDot"></div>

  <div id="loader">
    <svg class="loader-asterisk" viewBox="0 0 120 120">
      <polygon points="60,4 70,44 112,52 72,66 86,110 60,80 34,110 48,66 8,52 50,44" />
    </svg>
    <div class="loader-bar"></div>
  </div>

  <nav class="liquid-nav" id="liquidNav">
    <span class="brand">KNUFF</span>
    <div class="nav-links">
      <a href="index.html"><span>[&nbsp;&nbsp;&nbsp;]</span> Home</a>
      <a href="projects.html" class="active"><span>[●]</span> Works</a>
    </div>
  </nav>

  <button class="theme-fab" id="modeToggle">
    <div class="icon-wrap">
      <svg class="sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"></circle>
        <line x1="12" y1="1" x2="12" y2="3"></line>
        <line x1="12" y1="21" x2="12" y2="23"></line>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
        <line x1="1" y1="12" x2="3" y2="12"></line>
        <line x1="21" y1="12" x2="23" y2="12"></line>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
      </svg>
      <svg class="moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>

  <div class="scanlines"></div>
  <div class="vignette"></div>
  <div class="noise"></div>

  <div class="hud">
    <div class="hud-top">
      <a href="index.html">&larr; HOME</a>
      <div class="hud-line"></div>
      <span>FPS: <strong id="fps">60</strong></span>
    </div>
    <div class="center-nav">SCROLL VELOCITY // <strong id="vel-readout">0.00</strong></div>
    <div class="hud-bottom">
      <span>COORD: <strong id="coord">000.000</strong></span>
      <div class="hud-line"></div>
      <span>VER 2.0.4 [BETA]</span>
    </div>
  </div>

  <div class="viewport" id="viewport">
    <div class="world" id="world"></div>
  </div>

  <div class="scroll-proxy"></div>

  <script>
    var PROJECTS = [
      { name: "Drakkar Active", cat: "Brand Identity", desc: "Brand ecosystem for premium activewear. Motion-driven storytelling meets editorial precision.",
        imgs: [
          "https://framerusercontent.com/images/Nlya9IwhYh6s6r5ZswHRc4YQHg.png",
          "https://framerusercontent.com/images/CG9MtXGDbFzA9Y3WWWFZNhKIs.png",
          "https://framerusercontent.com/images/heVXihNvU4ndMh0cWOOQ3HUNpc.png"
        ]},
      { name: "Haut", cat: "Luxury Editorial", desc: "High-fashion editorial platform with immersive scroll narratives and custom typography.",
        imgs: [
          "https://framerusercontent.com/images/BRBumN8n23u5eJV05RjQcPI5pw.png",
          "https://framerusercontent.com/images/DY9v63bwpbHXZtk9t1NUYrXo.png",
          "https://framerusercontent.com/images/VbGKuq56GGN2Mbrob8yfTQrzVU.png"
        ]},
      { name: "C'estLaVie", cat: "Lifestyle", desc: "Culture-first destination blending photography, video, and reactive interface design.",
        imgs: [
          "https://framerusercontent.com/images/wGoJ1pR00RnyvY5yV2tHLnVug.png",
          "https://framerusercontent.com/images/L4JFjoPZv95YpM6qhRLzQPI.png",
          "https://framerusercontent.com/images/1B0RLMCaVDvsmorirSf1HArtCQ.png",
          "https://framerusercontent.com/images/61vAGpek5qdg4CUCzreUnlKbq3k.png",
          "https://framerusercontent.com/images/nJDCsAlglH6pY3T8CeibFY6s7A.png",
          "https://framerusercontent.com/images/8CRnhUEDW89tBdyeUWTZhjm7l7Q.png"
        ]},
      { name: "iPhone 17 PRO", cat: "Product Launch", desc: "Product reveal with real-time 3D rendering and cinematic transitions.",
        imgs: [
          "https://framerusercontent.com/images/olaOhrHVlGO3DVhHOpsfcyclEc.webp",
          "https://framerusercontent.com/images/p1fw8V44dorCn4I6xC4QxEhOkNI.webp",
          "https://framerusercontent.com/images/RKMUn21UkvG5GFzGOEdJBCCtEU.png",
          "https://framerusercontent.com/images/MRuRSshaUN3xI8oeVBarOalUE.png",
          "https://framerusercontent.com/images/xlCxWmnnoibpHVaZqY4dtimkNao.png",
          "https://framerusercontent.com/images/z9i9jrSneAzkwdVlHgLj5sNXSo.png"
        ]},
      { name: "Formula 1", cat: "Data Viz", desc: "High-speed telemetry dashboard with GPU-accelerated particle streams.",
        imgs: [
          "https://framerusercontent.com/images/hwb9Q2nCzzMELzMGcFG27McKznI.png",
          "https://framerusercontent.com/images/tsIdH7Wb6G0tBTxqVk4wil7CKc.png",
          "https://framerusercontent.com/images/Lle1JAy4yZOjmFVa9nyoEYtXnI.png"
        ]},
      { name: "District One", cat: "Urban Collection", desc: "Spatial web experience for urban lifestyle brand with layered storytelling.",
        imgs: [
          "https://framerusercontent.com/images/3saEbMas7UifS5hzk9nQ5mWs.png",
          "https://framerusercontent.com/images/ycL7gSAXPWU25Ey24mp8QLzDLPI.png",
          "https://framerusercontent.com/images/eWxuBQdWi5jh1btxHM4rLSNecFQ.jpeg"
        ]}
    ];

    var TEXTS = PROJECTS.map(function(p){ return p.name.toUpperCase(); });

    var isMobile = window.innerWidth < 768;
    var isSmall = window.innerWidth < 480;

    var CONFIG = {
      itemCount: isSmall ? 6 : isMobile ? 8 : 12,
      starCount: isSmall ? 40 : isMobile ? 80 : 150,
      zGap: 1000,
      loopSize: 0,
      camSpeed: 2.5,
      colors: ['#ff003c', '#00f3ff', '#ccff00', '#ffffff']
    };
    CONFIG.loopSize = CONFIG.itemCount * CONFIG.zGap;

    var state = { scroll: 0, velocity: 0, targetSpeed: 0, mouseX: 0, mouseY: 0 };
    var world = document.getElementById('world');
    var viewport = document.getElementById('viewport');
    var items = [];

    function init() {
      for (var i = 0; i < CONFIG.itemCount; i++) {
        var el = document.createElement('div');
        el.className = 'item';
        var isHeading = i % 2 === 0;

        if (isHeading) {
          var txt = document.createElement('div');
          txt.className = 'big-text';
          txt.innerText = TEXTS[Math.floor(i / 2) % TEXTS.length];
          el.appendChild(txt);
          var ty = (isMobile || isSmall) ? -window.innerHeight * 0.35 : 0;
          items.push({ el: el, type: 'text', x: 0, y: ty, rot: 0, baseZ: -i * CONFIG.zGap });
        } else {
          var projIdx = Math.floor(i / 2) % PROJECTS.length;
          var p = PROJECTS[projIdx];
          var card = document.createElement('div');
          card.className = 'card';
          card.setAttribute('data-proj', projIdx);
          var randId = 1001 + projIdx;
          function cardImgs(imgs) {
            if (isSmall) return '<div class="img-grid"><div class="img-main"><div class="img-wrap"><img src="' + imgs[0] + '" alt=""></div></div></div>';
            var h = '<div class="img-grid">';
            h += '<div class="img-main"><div class="img-wrap"><img src="' + imgs[0] + '" alt=""></div></div>';
            for (var ii = 1; ii < imgs.length; ii++) {
              var w = Math.round((0.77 + Math.random() * 0.46) * 100);
              h += '<div class="img-sm" style="width:' + w + '%"><div class="img-wrap"><img src="' + imgs[ii] + '" alt=""></div></div>';
            }
            h += '</div>';
            return h;
          }
          var imgsHtml = cardImgs(p.imgs);
          card.innerHTML =
            '<div class="card-header"><span class="card-id">ID-' + randId + '</span><div style="width:10px;height:10px;background:var(--accent);"></div></div>' +
            imgsHtml +
            '<div class="card-body"><h2>' + p.name.split(' ')[0] + '</h2><p>' + p.desc + '</p></div>' +
            '<div class="card-footer"><span>GRID: ' + (projIdx + 1) + 'x0' + (projIdx + 1) + '</span><span>DATA: ' + (Math.random() * 100).toFixed(1) + 'MB</span></div>' +
            '<div style="position:absolute;bottom:1.75rem;right:1.75rem;font-size:4rem;opacity:0.08;font-weight:900;pointer-events:none;color:var(--accent);">0' + (projIdx + 1) + '</div>';
          card.addEventListener('click', function(projIdx) {
            return function() { window.location.href = 'project.html?id=' + projIdx; };
          }(projIdx));
          el.appendChild(card);
          var angle = (i / CONFIG.itemCount) * Math.PI * 6;
          var spread = isSmall ? 0.35 : isMobile ? 0.3 : 0.25;
          var cx = (isMobile || isSmall) ? 0 : Math.cos(angle) * (window.innerWidth * spread);
          var cy = (isMobile || isSmall) ? 0 : Math.sin(angle) * (window.innerHeight * spread);
          var rot = (Math.random() - 0.5) * 25;

          items.push({ el: el, type: 'card', x: cx, y: cy, rot: rot, baseZ: -i * CONFIG.zGap });
        }
        world.appendChild(el);
      }

      for (var i = 0; i < CONFIG.starCount; i++) {
        var el = document.createElement('div');
        el.className = 'star';
        world.appendChild(el);
        items.push({ el: el, type: 'star', x: (Math.random() - 0.5) * 3000, y: (Math.random() - 0.5) * 3000, baseZ: -Math.random() * CONFIG.loopSize });
      }

      window.addEventListener('mousemove', function(e) {
        state.mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
        state.mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
      });
    }

    /* Preload fonts then start */
    var loader = document.getElementById('loader');
    document.fonts.ready.then(function() {
      init();
      loader.classList.add('hidden');
    });
    setTimeout(function() {
      if (!loader.classList.contains('hidden')) { init(); loader.classList.add('hidden'); }
    }, 3000);

    var lenis = new Lenis({ smooth: true, lerp: 0.08, direction: 'vertical', gestureDirection: 'vertical', smoothTouch: true });
    lenis.on('scroll', function(data) { state.scroll = data.scroll; state.targetSpeed = data.velocity; });

    var feedbackVel = document.getElementById('vel-readout');
    var feedbackFPS = document.getElementById('fps');
    var feedbackCoord = document.getElementById('coord');
    var lastTime = 0;

    function raf(time) {
      lenis.raf(time);
      var delta = time - lastTime; lastTime = time;
      if (time % 10 < 1) {
        var fps = Math.round(1000 / delta);
        if (feedbackFPS) feedbackFPS.innerText = Math.min(fps, 120);
      }
      state.velocity += (state.targetSpeed - state.velocity) * 0.1;
      if (feedbackVel) feedbackVel.innerText = Math.abs(state.velocity).toFixed(2);
      if (feedbackCoord) feedbackCoord.innerText = String(state.scroll).slice(0, 7);

      /* Snap to nearest card when scroll settles */
      if (Math.abs(state.velocity) < snapThreshold && !isSnapping && Math.abs(state.targetSpeed) < snapThreshold * 2) {
        var snaps = getCardSnapScrolls();
        var near = snaps[0], minD = Math.abs(state.scroll - near);
        for (var si = 1; si < snaps.length; si++) {
          var dd = Math.abs(state.scroll - snaps[si]);
          if (dd < minD) { minD = dd; near = snaps[si]; }
        }
        if (minD > 8) {
          isSnapping = true;
          lenis.scrollTo(near, { duration: 0.45, easing: function(t) { return 1 - Math.pow(1 - t, 3); } });
          setTimeout(function() { isSnapping = false; }, 550);
        }
      }

      var cameraZ = state.scroll * CONFIG.camSpeed;
      var tiltX = state.mouseY * 5 - state.velocity * 0.5;
      var tiltY = state.mouseX * 5;
      world.style.transform = 'rotateX(' + tiltX + 'deg) rotateY(' + tiltY + 'deg)';

      var baseFov = 1000;
      viewport.style.perspective = (baseFov - Math.min(Math.abs(state.velocity) * 10, 600)) + 'px';

      var modC = CONFIG.loopSize;
      for (var i = 0; i < items.length; i++) {
        var item = items[i];
        var relZ = item.baseZ + cameraZ;
        var vizZ = ((relZ % modC) + modC) % modC;
        if (vizZ > 500) vizZ -= modC;

        var alpha = 1;
        if (vizZ < -3000) alpha = 0;
        else if (vizZ < -2000) alpha = (vizZ + 3000) / 1000;
        if (vizZ > 100 && item.type !== 'star') alpha = 1 - ((vizZ - 100) / 400);
        if (alpha < 0.01) alpha = 0;
        item.el.style.opacity = alpha;

        if (alpha > 0) {
          var trans = 'translate3d(' + item.x + 'px, ' + item.y + 'px, ' + vizZ + 'px)';

          if (item.type === 'star') {
            var stretch = Math.max(1, Math.min(1 + Math.abs(state.velocity) * 0.1, 10));
            trans += ' scale3d(1, 1, ' + stretch + ')';
          } else if (item.type === 'text') {
            trans += ' rotateZ(' + item.rot + 'deg)';
            var dist = Math.abs(vizZ);
            if (dist > 400) {
              var blurAmt = Math.min((dist - 400) / 30, 12);
              item.el.style.filter = 'blur(' + blurAmt + 'px)';
            } else {
              item.el.style.filter = 'blur(0px)';
            }
          } else {
            var t = time * 0.001;
            var float = Math.sin(t + item.x) * 10;
            trans += ' rotateZ(' + item.rot + 'deg) rotateY(' + float + 'deg)';
            var dist = Math.abs(vizZ);
            if (dist > 300) {
              var blurAmt = Math.min((dist - 300) / 40, 8);
              item.el.style.filter = 'blur(' + blurAmt + 'px)';
            } else {
              item.el.style.filter = 'blur(0px)';
            }
          }
          item.el.style.transform = trans;
        }
      }
      requestAnimationFrame(raf);
    }
    requestAnimationFrame(raf);

    /* Snap-to-card + click modal */
    var isSnapping = false;
    var snapThreshold = 0.3;
    function getCardSnapScrolls() {
      var snaps = [];
      for (var ci = 0; ci < CONFIG.itemCount / 2; ci++) {
        snaps.push(((2*ci+1) * CONFIG.zGap) / CONFIG.camSpeed);
      }
      return snaps;
    }

    /* ─── Theme sync with liquid nav ─── */
    (function() {
      var stored = localStorage.getItem('knuff-theme') || localStorage.getItem('theme') || 'dark';
      var html = document.documentElement;
      html.className = stored;
      html.setAttribute('data-theme', stored);
      var btn = document.getElementById('modeToggle');
      if (btn) {
        btn.addEventListener('click', function() {
          var isDark = html.getAttribute('data-theme') === 'dark';
          var next = isDark ? 'light' : 'dark';
          html.className = next;
          html.setAttribute('data-theme', next);
          localStorage.setItem('knuff-theme', next);
          localStorage.setItem('theme', next);
        });
      }
    })();
  </script>

  <script>
    (function() {
      var t = document.getElementById('pageTransition');
      if (t) t.classList.remove('active');
      document.addEventListener('click', function(e) {
        var link = e.target.closest('a[href]');
        if (!link) return;
        var href = link.getAttribute('href');
        if (!href || href.startsWith('#') || href.startsWith('mailto:') || href.startsWith('http')) return;
        e.preventDefault();
        if (t) t.classList.add('active');
        setTimeout(function() { window.location.href = href; }, 350);
      });
    })();
  </script>
  <script>
    (function() {
      var ring = document.getElementById('cursorRing');
      var dot = document.getElementById('cursorDot');
      if (!ring || !dot) return;
      if (window.matchMedia('(pointer: coarse)').matches) { ring.style.display = 'none'; dot.style.display = 'none'; return; }
      var mx = 0, my = 0, rx = 0, ry = 0;
      document.addEventListener('mousemove', function(e) { mx = e.clientX; my = e.clientY; dot.style.left = mx + 'px'; dot.style.top = my + 'px'; });
      function tick() { rx += (mx - rx) * 0.12; ry += (my - ry) * 0.12; ring.style.left = rx + 'px'; ring.style.top = ry + 'px'; requestAnimationFrame(tick); }
      tick();
      var sel = 'a, button, input, textarea, [role="button"], .card, .service-card, .approach-item, .draw-toggle, .hero-cta, .form-submit';
      document.addEventListener('mouseover', function(e) { var t = e.target.closest(sel); if (t) { ring.classList.add('hover'); dot.classList.add('hover'); } });
      document.addEventListener('mouseout', function(e) { var t = e.target.closest(sel); if (t) { ring.classList.remove('hover'); dot.classList.remove('hover'); } });
    })();
  </script>
</body>
</html>
