<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — KNUFF</title>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wdth,wght@75,300;75,400;75,600;75,700&family=Roboto+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #000000;
      --bg-secondary: #0B0B0B;
      --bg-tertiary: #272A2A;
      --text-primary: #FFFFFF;
      --text-secondary: #CECECE;
      --text-muted: #858585;
      --accent: #CC6437;
      --border: #FFFFFF;
      --border-muted: rgba(255,255,255,0.12);
      --border-subtle: rgba(255,255,255,0.06);
      --font-condensed: 'Open Sans', sans-serif;
      --font-body: 'Roboto Mono', monospace;
      --text-caption: 11px;
      --text-body: 14px;
      --text-heading-lg: 24px;
      --text-display: 32px;
      --text-display-lg: clamp(32px, 5vw, 52px);
      --radius-pill: 1440px;
      --radius-subtle: 4px;
      --radius-general: 10px;
      --transition: 0.3s ease;
    }
    [data-theme="light"] {
      --bg-primary: #F2F2ED;
      --bg-secondary: #FFFFFF;
      --bg-tertiary: #E8E8E3;
      --text-primary: #0B0B0B;
      --text-secondary: #555555;
      --text-muted: #999999;
      --accent: #CC6437;
      --border: #0B0B0B;
      --border-muted: rgba(0,0,0,0.12);
      --border-subtle: rgba(0,0,0,0.06);
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg-primary); color: var(--text-primary);
      font-family: var(--font-body); font-size: var(--text-body);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      transition: background var(--transition), color var(--transition);
    }
    a { text-decoration: none; color: inherit; }
    input, textarea { font-family: inherit; font-size: inherit; color: inherit; }

    .page-transition {
      position: fixed; inset: 0; z-index: 10001;
      background: #000; pointer-events: none;
      opacity: 0; transition: opacity 0.35s ease;
    }
    .page-transition.active { opacity: 1; }

    .nav {
      position: fixed; top: 24px; left: 24px; right: 24px; z-index: 100;
      display: flex; align-items: center; justify-content: center;
      padding: 8px 20px;
    }
    .nav .brand {
      position: absolute; left: 20px; z-index: 2;
      font-family: var(--font-condensed); font-stretch: 75%;
      font-size: 14px; font-weight: 600; letter-spacing: -0.02em;
      color: var(--text-primary); text-transform: uppercase;
      padding: 6px 0;
    }
    .nav-links {
      display: flex; align-items: center; gap: 4px;
    }
    .nav-links a {
      font-family: var(--font-condensed); font-stretch: 75%;
      font-size: 13px; font-weight: 400; letter-spacing: -0.02em;
      color: var(--text-secondary); text-transform: uppercase;
      padding: 6px 16px; border-radius: var(--radius-pill);
      border: 1px solid transparent;
      transition: color var(--transition), background var(--transition), border-color var(--transition);
      display: flex; align-items: center; gap: 6px;
    }
    .nav-links a:hover { color: var(--text-primary); border-color: var(--border-muted); }
    .nav-links a.active, .nav-links a.active:hover {
      color: var(--text-primary); background: var(--bg-secondary);
      border-color: var(--border-muted);
    }

    .theme-fab {
      position: fixed; bottom: 32px; right: 32px; z-index: 200;
      width: 40px; height: 40px; border-radius: var(--radius-pill);
      background: transparent; border: 1px solid var(--border-muted);
      color: var(--text-secondary); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: color var(--transition), background var(--transition), border-color var(--transition);
    }
    .theme-fab:hover { color: var(--text-primary); border-color: var(--border); background: var(--bg-secondary); }
    .icon-wrap { position: relative; width: 16px; height: 16px; pointer-events: none; }
    .icon-wrap svg {
      position: absolute; top: 0; left: 0;
      transition: transform 0.5s cubic-bezier(0.34,1.2,0.64,1), opacity 0.4s ease;
      stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }
    .sun { opacity: 1; transform: rotate(0deg) scale(1); }
    .moon { opacity: 0; transform: rotate(-90deg) scale(0); }
    [data-theme="dark"] .sun { opacity: 0; transform: rotate(90deg) scale(0); }
    [data-theme="dark"] .moon { opacity: 1; transform: rotate(0deg) scale(1); }

    .page {
      max-width: 960px; margin: 0 auto;
      padding: 140px 24px 60px;
    }
    .page-hero {
      margin-bottom: 60px;
    }
    .page-hero h1 {
      font-family: var(--font-condensed); font-stretch: 75%;
      font-size: var(--text-display-lg); font-weight: 700;
      line-height: 1.05; letter-spacing: -0.02em;
      text-transform: uppercase; margin-bottom: 16px;
    }
    .page-hero p {
      font-family: var(--font-body);
      font-size: var(--text-body); line-height: 1.7;
      color: var(--text-secondary); max-width: 600px;
    }

    .contact-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 40px;
    }
    .contact-info { display: flex; flex-direction: column; gap: 24px; }
    .contact-item {}
    .contact-item .label {
      font-family: var(--font-condensed); font-stretch: 75%;
      font-size: var(--text-caption); font-weight: 600;
      letter-spacing: -0.02em; text-transform: uppercase;
      color: var(--text-muted); margin-bottom: 4px;
    }
    .contact-item a, .contact-item .value {
      font-size: var(--text-body); color: var(--text-primary);
      transition: color var(--transition);
    }
    .contact-item a:hover { color: var(--text-secondary); }

    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block;
      font-family: var(--font-condensed); font-stretch: 75%;
      font-size: var(--text-caption); font-weight: 600;
      letter-spacing: -0.02em; text-transform: uppercase;
      color: var(--text-muted); margin-bottom: 6px;
    }
    .form-group input,
    .form-group textarea {
      width: 100%; background: transparent;
      border: 1px solid var(--border-muted);
      border-radius: var(--radius-subtle);
      padding: 10px 14px; font-size: var(--text-body);
      color: var(--text-primary); outline: none;
      transition: border-color var(--transition);
    }
    .form-group input:focus,
    .form-group textarea:focus {
      border-color: var(--border);
    }
    .form-group textarea { min-height: 120px; resize: vertical; }
    .form-submit {
      font-family: var(--font-condensed); font-stretch: 75%;
      font-size: 13px; font-weight: 400; letter-spacing: -0.02em;
      text-transform: uppercase; color: var(--text-primary);
      background: transparent; border: 1px solid var(--border-muted);
      padding: 10px 24px; border-radius: var(--radius-pill);
      cursor: pointer; transition: background var(--transition), border-color var(--transition);
    }
    .form-submit:hover { background: var(--bg-secondary); border-color: var(--border); }

    .footer {
      padding: 24px 0;
      border-top: 1px solid var(--border-subtle);
      display: flex; justify-content: space-between; align-items: center;
      font-family: var(--font-body); font-size: var(--text-caption);
      color: var(--text-muted); margin-top: 60px;
    }
    .footer a { color: var(--text-secondary); transition: color var(--transition); }
    .footer a:hover { color: var(--text-primary); }
    .footer-links { display: flex; gap: 20px; }

    @media (max-width: 768px) {
      .nav { top: 16px; left: 12px; right: 12px; padding: 6px 12px; }
      .nav .brand { font-size: 12px; left: 12px; }
      .nav-links a { font-size: 11px; padding: 4px 10px; gap: 4px; }
      .theme-fab { bottom: 20px; right: 20px; width: 36px; height: 36px; }
      .page { padding: 120px 16px 40px; }
      .contact-grid { grid-template-columns: 1fr; gap: 32px; }
      .footer { flex-direction: column; gap: 12px; text-align: center; }
    }
    @media (max-width: 480px) {
      .nav-links a span { display: none; }
    }
  </style>
</head>
<body>
  <div class="page-transition" id="pageTransition"></div>

  <nav class="nav" id="nav">
    <span class="brand">KNUFF</span>
    <div class="nav-links">
      <a href="index.html"><span>[&nbsp;&nbsp;]</span> Home</a>
      <a href="projects.html"><span>[&nbsp;&nbsp;]</span> Works</a>
      <a href="about.html"><span>[&nbsp;&nbsp;]</span> About</a>
      <a href="contact.html" class="active"><span>[●]</span> Contact</a>
    </div>
  </nav>

  <button class="theme-fab" id="modeToggle">
    <div class="icon-wrap">
      <svg class="sun" width="16" height="16" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="5"/>
        <line x1="12" y1="1" x2="12" y2="3"/>
        <line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/>
        <line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
      <svg class="moon" width="16" height="16" viewBox="0 0 24 24">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </div>
  </button>

  <div class="page">
    <div class="page-hero">
      <h1>Contact</h1>
      <p>Have a project in mind or just want to start a conversation? I'm always open to new work and interesting collaborations.</p>
    </div>

    <div class="contact-grid">
      <div class="contact-info">
        <div class="contact-item">
          <div class="label">Email</div>
          <a href="mailto:hello@knuff.studio">hello@knuff.studio</a>
        </div>
        <div class="contact-item">
          <div class="label">Social</div>
          <div class="value">
            <a href="#" target="_blank">GitHub</a> / <a href="#" target="_blank">X</a> / <a href="#" target="_blank">LinkedIn</a>
          </div>
        </div>
      </div>

      <form id="contactForm">
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" required>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" required></textarea>
        </div>
        <button type="submit" class="form-submit">Send Message</button>
      </form>
    </div>

    <div class="footer">
      <div>&copy; 2026 KNUFF</div>
      <div class="footer-links">
        <a href="projects.html">Works</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </div>
      <a href="mailto:hello@knuff.studio">hello@knuff.studio</a>
    </div>
  </div>

  <script>
    (function() {
      var t = document.getElementById('pageTransition');
      if (t) t.classList.remove('active');
      document.addEventListener('click', function(e) {
        var link = e.target.closest('a[href]');
        if (!link) return;
        var href = link.getAttribute('href');
        if (!href || href.startsWith('#') || href.startsWith('mailto:') || href.startsWith('http')) return;
        e.preventDefault();
        if (t) t.classList.add('active');
        setTimeout(function() { window.location.href = href; }, 350);
      });
    })();
  </script>

  <script>
    (function() {
      var stored = localStorage.getItem('knuff-theme') || 'dark';
      document.documentElement.setAttribute('data-theme', stored);
      var btn = document.getElementById('modeToggle');
      if (btn) {
        btn.addEventListener('click', function() {
          var html = document.documentElement;
          var isDark = html.getAttribute('data-theme') === 'dark';
          var next = isDark ? 'light' : 'dark';
          html.setAttribute('data-theme', next);
          localStorage.setItem('knuff-theme', next);
        });
      }
    })();
  </script>

  <script>
    document.getElementById('contactForm').addEventListener('submit', function(e) {
      e.preventDefault();
      alert('Thanks for your message. I\'ll get back to you soon.');
    });
  </script>
</body>
</html>
