<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project — KNUFF</title>
  <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('knuff-theme') || 'dark');</script>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wdth,wght@75,300;75,400;75,600;75,700&family=Roboto+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #000000;
      --bg-secondary: #0B0B0B;
      --bg-tertiary: #272A2A;
      --text-primary: #FFFFFF;
      --text-secondary: #CECECE;
      --text-muted: #858585;
      --accent: #CC6437;
      --border: #FFFFFF;
      --border-muted: rgba(255,255,255,0.12);
      --border-subtle: rgba(255,255,255,0.06);
      --font-condensed: 'Open Sans', sans-serif;
      --font-body: 'Roboto Mono', monospace;
      --text-caption: 11px;
      --text-body: 14px;
      --text-heading-lg: 24px;
      --text-display: 32px;
      --text-display-lg: clamp(32px, 6vw, 56px);
      --radius-pill: 1440px;
      --radius-subtle: 4px;
      --radius-general: 10px;
      --transition: 0.3s ease;
    }
    [data-theme="light"] {
      --bg-primary: #F2F2ED;
      --bg-secondary: #FFFFFF;
      --bg-tertiary: #E8E8E3;
      --text-primary: #0B0B0B;
      --text-secondary: #555555;
      --text-muted: #999999;
      --accent: #CC6437;
      --border: #0B0B0B;
      --border-muted: rgba(0,0,0,0.12);
      --border-subtle: rgba(0,0,0,0.06);
    }
    [data-theme="light"] .nav { background: rgba(242,242,237,0.7); }
    [data-theme="light"] .theme-fab { background: rgba(242,242,237,0.8); }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg-primary); color: var(--text-primary);
      font-family: var(--font-body); font-size: var(--text-body);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      transition: background var(--transition), color var(--transition);
    }
    a { text-decoration: none; color: inherit; }
    img { display: block; max-width: 100%; }

    .page-transition {
      position: fixed; inset: 0; z-index: 10001;
      background: #000; pointer-events: none;
      opacity: 0; transition: opacity 0.35s ease;
    }
    .page-transition.active { opacity: 1; }

    .nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 40px;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border-subtle);
    }
    .nav .brand {
      font-family: var(--font-condensed); font-stretch: 75%;
      font-size: 15px; font-weight: 700; letter-spacing: -0.02em;
      color: var(--text-primary); text-transform: uppercase;
      text-decoration: none;
    }
    .nav-links {
      display: flex; align-items: center; gap: 6px;
    }
    .nav-links a {
      font-family: var(--font-condensed); font-stretch: 75%;
      font-size: 13px; font-weight: 400; letter-spacing: -0.02em;
      color: var(--text-secondary); text-transform: uppercase;
      padding: 6px 16px; border-radius: var(--radius-pill);
      border: 1px solid transparent;
      transition: color var(--transition), background var(--transition), border-color var(--transition);
      display: flex; align-items: center; gap: 6px;
      text-decoration: none;
    }
    .nav-links a:hover { color: var(--text-primary); border-color: var(--border-muted); }
    .nav-links a.active, .nav-links a.active:hover {
      color: var(--text-primary); background: var(--bg-secondary);
      border-color: var(--border-muted);
    }

    .theme-fab {
      position: fixed; bottom: 32px; right: 32px; z-index: 200;
      width: 40px; height: 40px; border-radius: var(--radius-pill);
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--border-muted);
      color: var(--text-secondary); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: color var(--transition), border-color var(--transition);
    }
    .theme-fab:hover { color: var(--text-primary); border-color: var(--border); }
    .icon-wrap { position: relative; width: 16px; height: 16px; pointer-events: none; }
    .icon-wrap svg {
      position: absolute; top: 0; left: 0;
      transition: transform 0.5s cubic-bezier(0.34,1.2,0.64,1), opacity 0.4s ease;
      stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }
    .sun { opacity: 1; transform: rotate(0deg) scale(1); }
    .moon { opacity: 0; transform: rotate(-90deg) scale(0); }
    [data-theme="dark"] .sun { opacity: 0; transform: rotate(90deg) scale(0); }
    [data-theme="dark"] .moon { opacity: 1; transform: rotate(0deg) scale(1); }

    .container {
      max-width: 960px; margin: 0 auto;
      padding: 140px 24px 60px;
    }
    .top-bar {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 24px;
      font-family: var(--font-body); font-size: var(--text-caption);
      color: var(--text-muted); text-transform: uppercase;
    }
    .top-bar .num { color: var(--accent); }

    h1 {
      font-family: var(--font-condensed); font-stretch: 75%;
      font-size: var(--text-display-lg); font-weight: 700;
      line-height: 1.05; letter-spacing: -0.02em;
      text-transform: uppercase; margin-bottom: 16px;
    }
    .cat {
      display: inline-block;
      font-family: var(--font-condensed); font-stretch: 75%;
      font-size: 12px; font-weight: 400; letter-spacing: -0.02em;
      color: var(--text-primary); text-transform: uppercase;
      border: 1px solid var(--border-muted);
      padding: 5px 14px; border-radius: var(--radius-pill);
      margin-bottom: 24px;
    }
    .desc {
      font-family: var(--font-body);
      font-size: var(--text-body); line-height: 1.7;
      color: var(--text-secondary); max-width: 600px;
      margin-bottom: 40px;
    }
    .img-gallery {
      display: flex; flex-direction: column; gap: 8px;
      margin-bottom: 48px;
    }
    .img-gallery img {
      width: 100%; border-radius: var(--radius-subtle);
      border: 1px solid var(--border-subtle);
    }
    .img-gallery .side-imgs {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
    }
    .project-nav {
      display: flex; justify-content: space-between; align-items: center;
      padding-top: 24px; border-top: 1px solid var(--border-subtle);
      font-family: var(--font-condensed); font-stretch: 75%;
      font-size: 13px; font-weight: 400; letter-spacing: -0.02em;
      text-transform: uppercase;
    }
    .project-nav a {
      color: var(--text-muted); padding: 8px 16px;
      border: 1px solid transparent; border-radius: var(--radius-pill);
      transition: color var(--transition), border-color var(--transition);
    }
    .project-nav a:hover { color: var(--text-primary); border-color: var(--border-muted); }
    .project-nav .disabled { opacity: 0.2; pointer-events: none; }

    @media (max-width: 768px) {
      .nav { padding: 10px 20px; }
      .nav .brand { font-size: 13px; }
      .nav-links a { font-size: 11px; padding: 4px 12px; gap: 4px; }
      .theme-fab { bottom: 20px; right: 20px; width: 36px; height: 36px; }
      .container { padding: 100px 16px 40px; }
      .img-gallery .side-imgs { grid-template-columns: 1fr; }
    }
    @media (max-width: 480px) {
      .nav-links a span { display: none; }
      .nav { padding: 10px 16px; }
      .nav-links a { padding: 4px 10px; }
    }
  </style>
</head>
<body>
  <div class="page-transition" id="pageTransition"></div>

  <nav class="nav" id="nav">
    <a href="index.html" class="brand">KNUFF</a>
    <div class="nav-links">
      <a href="index.html"><span>[&nbsp;&nbsp;]</span> Home</a>
      <a href="projects.html"><span>[●]</span> Works</a>
      <a href="about.html"><span>[&nbsp;&nbsp;]</span> About</a>
      <a href="contact.html"><span>[&nbsp;&nbsp;]</span> Contact</a>
    </div>
  </nav>

  <button class="theme-fab" id="modeToggle">
    <div class="icon-wrap">
      <svg class="sun" width="16" height="16" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="5"/>
        <line x1="12" y1="1" x2="12" y2="3"/>
        <line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/>
        <line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
      <svg class="moon" width="16" height="16" viewBox="0 0 24 24">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </div>
  </button>

  <div class="container" id="content"></div>

  <script>
    var PROJECTS = [
      { name: "Drakkar Active", cat: "Brand Identity", year: "2026",
        desc: "A comprehensive brand ecosystem built for premium activewear. Every touchpoint from packaging to digital communicates raw energy and editorial precision." },
      { name: "Haut", cat: "Luxury Editorial", year: "2026",
        desc: "A high-fashion editorial platform designed for the modern luxury audience. Immersive scroll narratives and custom typography create a timeless feel." },
      { name: "C'estLaVie", cat: "Lifestyle", year: "2025",
        desc: "A culture-first destination that blends photography, video, and reactive interface design. Content takes center stage in a fluid, responsive environment." },
      { name: "iPhone 17 PRO", cat: "Product Launch", year: "2025",
        desc: "A cinematic product reveal with real-time 3D rendering and seamless transitions. The interface guides visitors through a curated narrative." },
      { name: "Formula 1", cat: "Data Viz", year: "2025",
        desc: "A high-speed telemetry dashboard powered by GPU-accelerated particle streams. Real-time data flows through a dynamic interface." },
      { name: "District One", cat: "Urban Collection", year: "2024",
        desc: "A spatial web experience for an urban lifestyle brand. Layered storytelling and immersive navigation define the experience." }
    ];

    var idx = parseInt(new URLSearchParams(location.search).get('id')) || 0;
    if (idx < 0) idx = 0;
    if (idx >= PROJECTS.length) idx = 0;

    var p = PROJECTS[idx];
    document.title = p.name + ' — KNUFF';

    var content = document.getElementById('content');
    function galleryHtml() {
      var h = '<div class="img-gallery">';
      for (var gi = 0; gi < 6; gi += 2) {
        h += '<div class="side-imgs">';
        h += '<img src="https://placehold.co/800x600/' + (idx % 2 === 0 ? '0B0B0B' : '1a1a1a') + '/' + (idx % 2 === 0 ? 'FFFFFF' : 'CECECE') + '?text=Image+' + (gi + 1) + '" alt="">';
        h += '<img src="https://placehold.co/800x600/' + (idx % 2 === 0 ? '1a1a1a' : '0B0B0B') + '/' + (idx % 2 === 0 ? 'CECECE' : 'FFFFFF') + '?text=Image+' + (gi + 2) + '" alt="">';
        h += '</div>';
      }
      h += '</div>';
      return h;
    }
    content.innerHTML =
      '<div class="top-bar"><span class="num">' + String(idx + 1).padStart(2, '0') + '</span><span>&copy; ' + p.year + '</span></div>' +
      '<h1>' + p.name + '</h1>' +
      '<div class="cat">' + p.cat + '</div>' +
      '<div class="desc">' + p.desc + '</div>' +
      galleryHtml() +
      '<div class="project-nav">' +
      '<a href="project.html?id=' + (idx - 1) + '" class="' + (idx === 0 ? 'disabled' : '') + '">&larr; Previous</a>' +
      '<a href="projects.html">All Works</a>' +
      '<a href="project.html?id=' + (idx + 1) + '" class="' + (idx >= PROJECTS.length - 1 ? 'disabled' : '') + '">Next &rarr;</a>' +
      '</div>';
  </script>

  <script>
    (function() {
      var t = document.getElementById('pageTransition');
      if (t) t.classList.remove('active');
      document.addEventListener('click', function(e) {
        var link = e.target.closest('a[href]');
        if (!link) return;
        var href = link.getAttribute('href');
        if (!href || href.startsWith('#') || href.startsWith('mailto:') || href.startsWith('http')) return;
        e.preventDefault();
        if (t) t.classList.add('active');
        setTimeout(function() { window.location.href = href; }, 350);
      });
    })();
  </script>

  <script>
    var modeBtn = document.getElementById('modeToggle');
    if (modeBtn) {
      modeBtn.addEventListener('click', function() {
        var html = document.documentElement;
        var isDark = html.getAttribute('data-theme') === 'dark';
        var next = isDark ? 'light' : 'dark';
        html.setAttribute('data-theme', next);
        localStorage.setItem('knuff-theme', next);
      });
    }
  </script>
</body>
</html>
