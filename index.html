<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KNUFF — Creative Studio</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/gsap@3/dist/gsap.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html.dark { --bg: #000; --text: #e5e5e5; --muted: #555; --border: rgba(255,255,255,0.06); --accent: #dc2626; --loader-bg: #000; }
    html.light { --bg: #f5f5f0; --text: #1a1a1a; --muted: #999; --border: rgba(0,0,0,0.07); --accent: #dc2626; --loader-bg: #f5f5f0; }

    html { scroll-behavior: smooth; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
      overflow: hidden; height: 100vh; width: 100vw;
    }
    ::selection { background: var(--accent); color: #fff; }
    a { text-decoration: none; color: inherit; }

    #loader {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: var(--loader-bg);
      transition: opacity 0.8s ease, visibility 0.8s ease;
    }
    #loader.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    .loader-asterisk {
      width: 36px; height: 36px;
      animation: loader-spin 1.6s linear infinite;
    }
    .loader-asterisk polygon { fill: var(--accent); }
    .loader-bar {
      margin-top: 2rem; width: 120px; height: 1px;
      background: var(--border); overflow: hidden; position: relative;
    }
    .loader-bar::after {
      content: ''; position: absolute; top: 0; left: -100%;
      width: 100%; height: 100%; background: var(--accent);
      animation: loader-sweep 1.4s ease-in-out infinite;
    }
    @keyframes loader-spin { to { transform: rotate(360deg); } }
    @keyframes loader-sweep {
      0% { left: -100%; }
      100% { left: 200%; }
    }

    .toggle-mode {
      position: fixed; bottom: 2rem; right: 2rem; z-index: 100;
      background: var(--border); border: none; color: var(--text);
      padding: 0.5rem 1rem; font-family: 'DM Mono', monospace;
      font-size: 0.6rem; cursor: pointer; text-transform: uppercase;
      letter-spacing: 0.12em; border-radius: 2px; transition: 0.3s;
      backdrop-filter: blur(12px);
    }
    .toggle-mode:hover { background: var(--accent); color: #fff; }

    .scanlines {
      position: fixed; inset: 0; z-index: 1; pointer-events: none;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
    }

    #fixed-bg { position: fixed; inset: 0; z-index: 0; }
    #fixed-bg canvas { width: 100%; height: 100%; display: block; }

    .nav {
      position: fixed; top: 0; left: 0; width: 100%; z-index: 50;
      padding: 2rem 2.5rem; display: flex; justify-content: space-between; align-items: center;
    }
    .nav-logo {
      font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.15em; color: var(--text);
    }
    .nav-links { display: flex; gap: 2rem; }
    .nav-links a {
      font-family: 'DM Mono', monospace; font-size: 0.6rem;
      text-transform: uppercase; letter-spacing: 0.12em;
      color: var(--muted); transition: color 0.3s; position: relative;
    }
    .nav-links a::after {
      content: ''; position: absolute; bottom: -3px; left: 0;
      width: 0; height: 1px; background: var(--accent);
      transition: width 0.35s cubic-bezier(.16,1,.3,1);
    }
    .nav-links a:hover { color: var(--text); }
    .nav-links a:hover::after { width: 100%; }

    .side-text {
      position: fixed; z-index: 20; pointer-events: none;
      font-family: 'Inter', sans-serif;
      mix-blend-mode: difference; color: #fff;
    }
    .side-left { left: 2.5rem; top: 50%; transform: translateY(-50%); text-align: left; }
    .side-right { right: 2.5rem; top: 50%; transform: translateY(-50%); text-align: right; }
    .side-label {
      font-family: 'DM Mono', monospace; font-size: 0.55rem;
      text-transform: uppercase; letter-spacing: 0.15em;
      color: #fff; margin-bottom: 0.75rem; display: block; opacity: 0.7;
    }
    .side-title {
      font-size: clamp(2.2rem, 5vw, 4.5rem);
      font-weight: 800; line-height: 0.85;
      text-transform: uppercase; letter-spacing: -0.03em;
      color: #fff;
    }
    .side-sub {
      font-size: 0.7rem; font-weight: 400;
      color: #fff; line-height: 1.6;
      margin-top: 1rem; max-width: 200px;
    }
    .side-right .side-sub { margin-left: auto; }

    .asterisk-wrap {
      position: fixed; z-index: 15; pointer-events: none;
      transform: translate(-50%, -50%);
    }
    .asterisk-svg {
      width: 56px; height: 56px;
      animation: spin-asterisk 14s linear infinite;
    }
    .asterisk-svg polygon { fill: var(--accent); }
    @keyframes spin-asterisk { to { transform: rotate(360deg); } }

    .bottom-cta {
      position: fixed; bottom: 2rem; left: 2.5rem; z-index: 20;
    }
    .bottom-cta a {
      font-family: 'DM Mono', monospace; font-size: 0.6rem;
      text-transform: uppercase; letter-spacing: 0.12em;
      color: var(--muted); transition: color 0.3s; position: relative;
      padding-bottom: 2px;
    }
    .bottom-cta a::after {
      content: ''; position: absolute; bottom: 0; left: 0;
      width: 100%; height: 1px; background: var(--accent);
      transform: scaleX(0); transform-origin: right;
      transition: transform 0.4s cubic-bezier(.16,1,.3,1);
    }
    .bottom-cta a:hover { color: var(--text); }
    .bottom-cta a:hover::after { transform: scaleX(1); transform-origin: left; }

    html.light .toggle-mode { color: var(--text); background: var(--border); }

    @media (max-width: 768px) {
      .side-left { left: 1.25rem; }
      .side-right { right: 1.25rem; }
      .side-title { font-size: clamp(1.4rem, 6vw, 2.2rem); }
      .side-label { font-size: 0.45rem; margin-bottom: 0.5rem; }
      .side-sub { font-size: 0.55rem; max-width: 120px; margin-top: 0.5rem; }
      .nav { padding: 1.25rem; }
      .nav-links { gap: 1rem; }
      .nav-links a { font-size: 0.45rem; }
      .nav-logo { font-size: 0.55rem; }
      .asterisk-svg { width: 32px; height: 32px; }
      .bottom-cta { left: 1.25rem; bottom: 1.25rem; }
      .bottom-cta a { font-size: 0.45rem; }
      .toggle-mode { right: 1.25rem; bottom: 1.25rem; font-size: 0.45rem; padding: 0.35rem 0.7rem; }
    }
    @media (max-width: 480px) {
      .side-title { font-size: clamp(1rem, 7vw, 1.6rem); }
      .side-sub { display: none; }
      .side-label { font-size: 0.4rem; }
      .nav-links a { font-size: 0.4rem; }
      .asterisk-svg { width: 24px; height: 24px; }
    }
    @media (max-height: 500px) {
      .side-text { top: auto; bottom: 5rem; transform: none; }
      .side-left { left: 1.25rem; }
      .side-right { right: 1.25rem; }
      .side-title { font-size: 1.4rem; }
    }
  </style>
</head>
<body>

  <div id="loader">
    <svg class="loader-asterisk" viewBox="0 0 120 120">
      <polygon points="60,4 70,44 112,52 72,66 86,110 60,80 34,110 48,66 8,52 50,44" />
    </svg>
    <div class="loader-bar"></div>
  </div>

  <div id="fixed-bg">
    <canvas id="c"></canvas>
  </div>

  <div class="scanlines"></div>

  <button class="toggle-mode" id="toggleMode">&#127769; Dark</button>

  <nav class="nav">
    <a href="index.html" class="nav-logo">KNUFF</a>
    <div class="nav-links">
      <a href="projects.html">Projects</a>
    </div>
  </nav>

  <div class="side-text side-left">
    <span class="side-label">Creative Developer</span>
    <div class="side-title">Motion<br>Engineer</div>
    <div class="side-sub">Crafting interactive systems with precision</div>
  </div>

  <div class="side-text side-right">
    <span class="side-label">KNUFF</span>
    <div class="side-title">Motion<br>Design</div>
    <div class="side-sub">Creative studio &mdash; San Francisco</div>
  </div>

  <div class="asterisk-wrap">
    <svg class="asterisk-svg" viewBox="0 0 120 120">
      <polygon points="60,4 70,44 112,52 72,66 86,110 60,80 34,110 48,66 8,52 50,44" />
    </svg>
  </div>

  <div class="bottom-cta">
    <a href="projects.html">Explore Selected Work &rarr;</a>
  </div>

  <script>
    var c, ctx, W, H, dots, mouse, spacing, T;

    function startApp() {
      c = document.querySelector('#c');
      ctx = c.getContext('2d');
      T = Math.PI * 2;
      mouse = { x: -999, y: -999 };
      spacing = window.innerWidth < 480 ? 50 : 40;

      resizeCanvas();
      buildGrid();
      animate();
      document.getElementById('loader').classList.add('hidden');

      c.addEventListener('pointermove', function(e) {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
      });
      c.addEventListener('pointerleave', function() {
        mouse.x = -999;
        mouse.y = -999;
      });
      window.addEventListener('resize', function() {
        spacing = window.innerWidth < 480 ? 50 : 40;
        resizeCanvas();
        buildGrid();
      });
    }

    function resizeCanvas() {
      W = window.innerWidth; H = window.innerHeight;
      c.width = W; c.height = H;
    }

    function buildGrid() {
      dots = [];
      for (var x = spacing; x < W; x += spacing)
        for (var y = spacing; y < H; y += spacing)
          dots.push({ x: x, y: y });
    }

    function animate() {
      ctx.clearRect(0, 0, W, H);
      var htmlEl = document.documentElement;
      var isLight = htmlEl.className === 'light';
      var dotColor = isLight ? '0,0,0' : '255,255,255';
      var maxDist = spacing * 4;

      for (var i = 0; i < dots.length; i++) {
        var dx = dots[i].x - mouse.x;
        var dy = dots[i].y - mouse.y;
        var dist = Math.sqrt(dx * dx + dy * dy);
        var pull = Math.max(0, 1 - dist / maxDist);
        var size = 1.5 + pull * 6;
        var alpha = 0.15 + pull * 0.85;
        var ox = dx * pull * 0.4;
        var oy = dy * pull * 0.4;
        ctx.beginPath();
        ctx.arc(dots[i].x + ox, dots[i].y + oy, size, 0, T);
        ctx.fillStyle = 'rgba(' + dotColor + ',' + alpha + ')';
        ctx.fill();
      }
      requestAnimationFrame(animate);
    }

    /* Theme toggle */
    var toggleBtn = document.getElementById('toggleMode');
    var htmlEl = document.documentElement;
    if (localStorage.getItem('theme') === 'light') {
      htmlEl.className = 'light';
      toggleBtn.textContent = '\u2600\uFE0F Light';
    }
    toggleBtn.addEventListener('click', function() {
      if (htmlEl.className === 'light') {
        htmlEl.className = 'dark';
        toggleBtn.textContent = '\uD83C\uDF19 Dark';
        localStorage.setItem('theme', 'dark');
      } else {
        htmlEl.className = 'light';
        toggleBtn.textContent = '\u2600\uFE0F Light';
        localStorage.setItem('theme', 'light');
      }
    });

    /* Fonts ready + fallback */
    document.fonts.ready.then(startApp);
    setTimeout(function() { if (!c) startApp(); }, 3000);
  </script>
</body>
</html>
